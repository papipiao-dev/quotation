<body class="bg-surface text-on-surface min-h-screen">
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm">
<h1 class="text-lg font-semibold tracking-tighter text-slate-900 dark:text-slate-100 mx-auto">装修报价计算器</h1>
</nav>

<main class="pt-24 pb-12">

<div class="px-6 space-y-12">
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">城市与面积</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 01</span>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">所在城市</label>
<div class="relative">
<input id="city-input" readonly onclick="openCityPicker()" class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all cursor-pointer text-black" placeholder="正在定位中..." type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">location_on</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">建筑面积 (㎡)</label>
<input id="area-input" onblur="validateArea()" class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant" placeholder="输入面积 (40-300)" type="number" min="40" max="300" step="0.01"/>
</div>
</div>
</section>

<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">房屋状态</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 02</span>
</div>
<div class="flex gap-2.5 overflow-x-auto pb-1 scrollbar-hide">
<button id="btn-maopi" onclick="switchCondition('maopi')" class="flex-none px-6 py-2.5 rounded-full bg-black text-white text-sm font-medium transition-transform active:scale-95 shadow-sm">毛坯房</button>
<button id="btn-laofang" onclick="switchCondition('laofang')" class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">老房翻新</button>
</div>
<div class="p-5 bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_-10px_rgba(45,51,56,0.04)] border border-outline-variant/10">
<p id="condition-hint" class="text-xs text-on-surface-variant leading-relaxed">
从0到1精工筑家。涵盖空间动线重塑、国标级水电落位、高精度墙地找平及严苛防水体系。做实隐蔽工程，让您的每一分预算都化为高品质的居住底座。
</p>
</div>
</section>

<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">户型布局</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 03</span>
</div>
<div class="space-y-3">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">选择房型</label>
<div class="grid grid-cols-2 gap-3" id="layout-buttons">
<button onclick="selectLayout('1室1厅', this)" class="layout-btn h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">1室1厅</button>
<button onclick="selectLayout('2室1厅', this)" class="layout-btn h-12 bg-black text-white text-sm font-medium transition-all shadow-lg shadow-black/10 rounded-lg active-layout">2室1厅</button>
<button onclick="selectLayout('3室1厅', this)" class="layout-btn h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">3室1厅</button>
<button onclick="selectLayout('4室2厅', this)" class="layout-btn h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">4室2厅</button>
</div>
</div>
</section>

<section class="pt-8 pb-12">
<div class="space-y-4">
<div class="space-y-1">
<div class="text-[11px] leading-[1.3] text-slate-500 text-left">测算结果将包含主材、辅材、人工明细。</div>
<div class="text-[11px] leading-[1.3] text-slate-500 text-left">今日已有 <span class="font-bold text-black italic">128</span> 位业主获取专属防坑报价单。</div>
</div>
<button onclick="goToBOM()" class="w-full h-14 bg-black text-white font-bold shadow-2xl shadow-black/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 tracking-wide rounded-lg">
<span>开始计算报价</span>
<span class="material-symbols-outlined text-xl" data-icon="calculate">calculate</span>
</button>
</div>
</section>
</div>
</main>

<div id="city-picker-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeCityPicker()"></div>
    <div id="city-picker-sheet" class="absolute inset-x-0 bottom-0 bg-surface-container-lowest rounded-t-3xl p-6 shadow-2xl transform transition-transform duration-300 translate-y-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-on-surface">手动选择城市</h3>
            <button onclick="closeCityPicker()" class="p-2 -mr-2 rounded-full hover:bg-surface-container-high transition-colors">
                <span class="material-symbols-outlined text-on-surface-variant">close</span>
            </button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="space-y-2">
                <label class="text-xs font-medium text-on-surface-variant ml-1">省份 / 直辖市</label>

            </div>

                <label class="text-xs font-medium text-on-surface-variant ml-1">城市</label>
                <select id="city-select" class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black font-medium"></select>
            </div>
        </div>
        <button onclick="confirmCityPicker()" class="w-full h-14 bg-black text-white font-bold rounded-xl active:scale-[0.98] transition-all tracking-wide">
            确认选择
        </button>
    </div>
</div>

<script>
// 拦截 URL 中的分享人 ID 并存入浏览器缓存
const urlParams = new URLSearchParams(window.location.search);
const uid = urlParams.get('uid');
if (uid) {
    sessionStorage.setItem('referrer_uid', uid);
}

let currentCondition = 'maopi'; 
let currentLayout = '2室1厅';   

function validateArea() {
    const areaInput = document.getElementById('area-input');
    if (!areaInput.value) return; 
    
    let areaVal = parseFloat(areaInput.value);
    if (areaVal < 40 || areaVal > 300) {
        alert("提示：建筑面积必须在 40 到 300 ㎡ 之间");
        areaInput.value = ''; 
        return;
    }
    areaInput.value = parseFloat(areaVal.toFixed(2));
}

function switchCondition(type) {
    currentCondition = type;
    const btnMaopi = document.getElementById('btn-maopi');
    const btnLaofang = document.getElementById('btn-laofang');
    const hintText = document.getElementById('condition-hint');

    const activeClasses = ['bg-black', 'text-white', 'shadow-sm'];
    const inactiveClasses = ['bg-surface-container-high', 'text-on-surface-variant', 'hover:bg-surface-container-highest'];

    if (type === 'maopi') {
        btnMaopi.classList.remove(...inactiveClasses);
        btnMaopi.classList.add(...activeClasses);
        btnLaofang.classList.remove(...activeClasses);
        btnLaofang.classList.add(...inactiveClasses);
        hintText.innerText = '从0到1精工筑家。涵盖空间动线重塑、国标级水电落位、高精度墙地找平及严苛防水体系。做实隐蔽工程，让您的每一分预算都化为高品质的居住底座。';
    } else if (type === 'laofang') {
        btnLaofang.classList.remove(...inactiveClasses);
        btnLaofang.classList.add(...activeClasses);
        btnMaopi.classList.remove(...activeClasses);
        btnMaopi.classList.add(...inactiveClasses);
        hintText.innerText = '告别隐患，让家脱胎换骨。包含『排雷式』拆除清运、老化水电路彻底焕新、墙基深层加固及防渗漏重塑。根除历史顽疾，打造比新房更安心的居住体验。';
    }
}

function selectLayout(layout, btnElement) {
    currentLayout = layout;
    const buttons = document.querySelectorAll('.layout-btn');
    buttons.forEach(btn => {
        btn.className = 'layout-btn h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg';
    });
    btnElement.className = 'layout-btn h-12 bg-black text-white text-sm font-medium transition-all shadow-lg shadow-black/10 rounded-lg active-layout';
}

function goToBOM() {
    const city = document.getElementById('city-input').value;
    const area = document.getElementById('area-input').value;

    if (!city || city === "正在定位中..." || city === "定位失败，请点击选择") {
        alert("请选择所在城市");
        return;
    }
    
    const areaVal = parseFloat(area);
    if (!areaVal || areaVal < 40 || areaVal > 300) {
        alert("请输入40到300之间的建筑面积(㎡)");
        return;
    }

    const quotationData = {
        city: city,
        area: areaVal,
        condition: currentCondition === 'maopi' ? '毛坯房' : '老房翻新',
        layout: currentLayout
    };
    sessionStorage.setItem('quotationData', JSON.stringify(quotationData));

    window.location.href = 'bom.html';
}

async function autoLocateCityByIP() {
    const input = document.getElementById('city-input');
    try {
        const response = await fetch('https://api.vvhan.com/api/ipInfo');
        const data = await response.json();
        if (data && data.success && data.info && data.info.city) {
            input.value = data.info.city;
        } else {
            input.value = ""; 
            input.placeholder = "定位失败，请点击选择";
        }
    } catch (error) {
        input.value = "";
        input.placeholder = "定位失败，请点击选择";
    }
}

function initCityPickerData() {
    const provSelect = document.getElementById('province-select');
    for (let prov in regionData) {
        let opt = document.createElement('option');
        opt.value = prov;
        opt.innerText = prov;
        provSelect.appendChild(opt);
    }
    updateCityOptions();
}

function updateCityOptions() {
    const provSelect = document.getElementById('province-select');
    const citySelect = document.getElementById('city-select');
    const selectedProv = provSelect.value;
    citySelect.innerHTML = ''; 
    if(regionData[selectedProv]) {
        regionData[selectedProv].forEach(city => {
            let opt = document.createElement('option');
            opt.value = city;
            opt.innerText = city;
            citySelect.appendChild(opt);
        });
    }
}

function openCityPicker() {
    const modal = document.getElementById('city-picker-modal');
    const sheet = document.getElementById('city-picker-sheet');
    modal.classList.remove('hidden');
    void modal.offsetWidth; 
    sheet.classList.remove('translate-y-full');
}

function closeCityPicker() {
    const modal = document.getElementById('city-picker-modal');
    const sheet = document.getElementById('city-picker-sheet');
    sheet.classList.add('translate-y-full');
    setTimeout(() => { modal.classList.add('hidden'); }, 300);
}

function confirmCityPicker() {
    const citySelect = document.getElementById('city-select');
    const input = document.getElementById('city-input');
    if (citySelect.value) { input.value = citySelect.value; }
    closeCityPicker();
}
</script>
</body>
</html>
