<main class="pt-6 pb-12 px-6 max-w-2xl mx-auto">
    <section class="bg-[#e8e8ed] p-1 rounded-full flex gap-1 mb-6 relative">
        <button class="tab-btn tab-active flex-1 py-2 text-[13px] font-medium rounded-full transition-all duration-300">经济实用</button>
        <button class="tab-btn flex-1 py-2 text-[13px] font-medium rounded-full text-on-surface-variant hover:text-on-surface transition-all duration-300">品质主流</button>
        <button class="tab-btn flex-1 py-2 text-[13px] font-medium rounded-full text-on-surface-variant hover:text-on-surface transition-all duration-300">奢华环保</button>
    </section>

    <div class="mb-5 mt-2">
        <a href="index.html" class="inline-flex items-center justify-center rounded-full active:scale-95 transition-all" style="width: 36px; height: 36px; background-color: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-decoration: none; color: #1d1d1f;">
            <svg style="width: 20px; height: 20px; margin-right: 2px;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </a>

    <section class="text-left mb-10 min-h-[180px]">

            <span class="text-[32px] sm:text-[40px] font-bold tracking-tighter text-on-surface leading-none" id="currency-symbol">¥</span>
            <span class="text-[64px] sm:text-[80px] font-bold tracking-tighter text-on-surface leading-none" id="price-value">--</span>

            <div class="hidden items-baseline" id="local-loading-state">
                <span class="text-[40px] sm:text-[56px] font-bold tracking-tighter text-on-surface-variant leading-none" id="local-loading-text">正在计算</span>
            </div>
        </div>

        <p class="text-on-surface-variant text-[14px] leading-relaxed max-w-md mt-6" id="description-text">
            正在加载您的专属配置方案... <span id="selected-tier" style="display:none;"></span>
        </p>
    </section>

    <div class="mb-5 mt-4 text-left">
        <h2 class="text-[24px] font-bold tracking-tight text-on-surface">装修过程避坑指南</h2>
        <p class="text-[13px] text-on-surface-variant mt-1">资深工长梳理：装修全阶段<strong style="font-size: 18px; color: #000; font-weight: 900; margin: 0 3px;">186</strong>项避坑指南</p>
    </div>

    <div id="guide-container">
        <p class="text-on-surface-variant text-center py-4">正在加载数据...</p>
    </div>

    <div style="margin-top: 32px; padding: 24px; background-color: #fff1f2; border-radius: 24px; border: 2px solid #ffe4e6; text-align: center; box-shadow: 0 10px 25px -5px rgba(225, 29, 72, 0.1);">
        <p style="font-size: 20px; color: #e11d48; font-weight: 800; line-height: 1.6; margin: 0; letter-spacing: 0.5px;">
            聪明的装修，绝不能只看一家。<br>
            带着这份避坑指南，让<br>
            <span style="font-size: 32px; color: #be123c; font-weight: 900; text-decoration: underline; padding: 0 4px;">多家、多家、多家</span><br>
            优质公司为您出方案，谁性价比高选谁！
        </p>
    </div>
    </main>

<div id="unlock-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeUnlockModal()"></div>
    <div class="relative bg-white w-[90%] max-w-sm rounded-3xl p-8 shadow-2xl z-10">
        <h3 class="text-xl font-bold mb-6 text-center text-on-surface">解锁完整避坑指南</h3>
        
        <div style="display: flex; flex-direction: column; gap: 16px; width: 100%;">
            <input type="tel" id="phone-input" placeholder="请输入手机号码" maxlength="11" class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant/30 rounded-xl focus:ring-1 focus:ring-black outline-none transition-all">
            
            <div style="display: flex; gap: 12px; width: 100%;">
                <input type="text" id="code-input" placeholder="验证码" maxlength="6" style="flex: 1; min-width: 0;" class="h-12 px-4 bg-surface-container-low border border-outline-variant/30 rounded-xl focus:ring-1 focus:ring-black outline-none transition-all">
                <button id="send-code-btn" onclick="sendVerifyCode()" style="width: 105px; flex-shrink: 0;" class="h-12 bg-black text-white font-medium rounded-xl text-xs active:scale-95 transition-transform">获取验证码</button>
            </div>
            
            <button onclick="confirmUnlock()" class="w-full h-12 mt-2 bg-black text-white font-bold rounded-xl shadow-lg active:scale-95 transition-all tracking-wide">
                立即解锁
            </button>
        </div>
        
        <button onclick="closeUnlockModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-black transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>
</div>

<div id="agreement-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeAgreementModal()"></div>
    <div class="relative bg-white w-[90%] max-w-sm rounded-2xl shadow-2xl z-10 text-center" style="padding: 28px 24px 24px 24px;">
        <h3 class="font-bold mb-4 text-on-surface" style="font-size: 18px;">温馨提示</h3>
        <p class="text-[14px] text-on-surface-variant mb-8">请阅读并同意<a href="user_agreement.html" style="color: purple; text-decoration: none;">《用户协议》</a>和<a href="privacy_policy.html" style="color: purple; text-decoration: none;">《隐私协议》</a></p>
        <div class="flex gap-4 w-full justify-between">
            <button onclick="closeAgreementModal()" class="flex-1 h-12 bg-surface-container-low text-on-surface font-medium rounded-xl active:scale-95 transition-all border-none">取消</button>
            <button onclick="agreeAndContinue()" class="flex-1 h-12 bg-black text-white font-medium rounded-xl active:scale-95 transition-all border-none">同意并继续</button>
        </div>
    </div>
</div>

<div id="toast-message" style="display: none; opacity: 0; transition: opacity 0.3s; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0,0,0,0.85); color: white; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 500; z-index: 9999; pointer-events: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); white-space: nowrap; text-align: center;">
    成功解锁
</div>

<script>
    let localTimeout = null;
    let localDotInterval = null; 
    let quoteData = null; 
    let globalCsvData = []; 
    let isUnlocked = localStorage.getItem('guide_unlocked') === 'true'; 

    const TIER1_CITIES = ['北京', '上海', '广州', '深圳'];
    const TIER2_CITIES = ['西安', '兰州', '银川', '呼和浩特', '重庆', '绵阳', '南充', '昆明', '贵阳', '南宁', '成都', '佛山', '惠州', '中山', '珠海', '海口', '东莞', '苏州', '南京', '武汉', '长沙', '南昌', '无锡', '盐城', '扬州', '徐州', '淮安', '镇江', '常州', '天津', '石家庄', '太原', '济南', '潍坊', '郑州', '廊坊', '保定', '青岛', '沈阳', '大连', '哈尔滨', '长春', '宁波', '金华', '南通', '绍兴', '温州', '泰州', '福州', '厦门', '泉州', '杭州', '嘉兴', '合肥', '芜湖'];

    const TIER_PRICES = { '经济实用': 1000, '品质主流': 1600, '奢华环保': 2500 };
    const LAYOUT_COEFFICIENT = { '1室1厅': 1.0, '2室1厅': 1.05, '3室1厅': 1.1, '其他': 1.15 };

    document.addEventListener('DOMContentLoaded', () => {
        const dataStr = sessionStorage.getItem('quotationData');
        if (dataStr) {
            quoteData = JSON.parse(dataStr);
        } else {
            quoteData = { city: '上海市', area: 82, condition: '老房翻新', layout: '2室1厅' };
        }
        
        calculateAndDisplay('经济实用');
        loadCSVData(); 

        const tabs = document.querySelectorAll('.tab-btn');
        tabs[0].onclick = function() { switchTabLocal(this, '经济实用'); };
        tabs[1].onclick = function() { switchTabLocal(this, '品质主流'); };
        tabs[2].onclick = function() { switchTabLocal(this, '奢华环保'); };
    });

    function loadCSVData() {
        Papa.parse('data.csv', {
            download: true,
            header: true, 
            skipEmptyLines: true, 
            complete: function(results) {
                globalCsvData = results.data; 
                renderGuideData(globalCsvData);
            },
            error: function(err) {
                console.error("加载 data.csv 失败", err);
                document.getElementById('guide-container').innerHTML = '<p class="text-red-500 text-center py-4">未能加载 data.csv 数据，请检查网络或文件路径。</p>';
            }
        });
    }

    function renderGuideData(data) {
        const container = document.getElementById('guide-container');
        container.innerHTML = ''; 

        const groupedData = {};
        data.forEach(row => {
            if (!row['大类']) return; 
            const stage = row['大类']; 
            if (!groupedData[stage]) {
                groupedData[stage] = [];
            }
            groupedData[stage].push(row);
        });

        const stages = Object.keys(groupedData);
        let stopRendering = false; 

        stages.forEach((stageName) => {
            if (stopRendering) return;

            const items = groupedData[stageName];

            let sectionHtml = `
                <section class="apple-card relative" style="padding: 24px 20px; margin-bottom: 28px;">
                    <div style="margin-bottom: 16px;">
                        <h3 style="font-size: 20px; font-weight: 700; margin: 0; color: #1d1d1f; letter-spacing: -0.025em;">${stageName}</h3>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 24px;">
            `;

            for (let i = 0; i < items.length; i++) {
                if (stopRendering) break;

                const item = items[i];
                const itemNum = item['序号'] || (i + 1);
                const itemName = item['施工细项'] || '未命名项目';
                const itemUnit = item['单位'] || '-';
                
                let rawText = item['说明'] || '';
                let warningText = item['警锁'] || item['警示'] || '';
                let pitfallText = item['避坑'] || '';

                if (rawText) {
                    const warningMatch = rawText.match(/\*\*\[警\]\*\*(.*?)(?=\*\*\[避坑\]\*\*|$)/);
                    const pitfallMatch = rawText.match(/\*\*\[避坑\]\*\*(.*)/);
                    if (warningMatch) warningText = warningMatch[1].trim();
                    if (pitfallMatch) pitfallText = pitfallMatch[1].trim();
                }

                let warningHtml = warningText ? 
                    `<div style="background-color: #fffbeb; color: #78350f; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; border: 1px solid #fef3c7;">
                        <span style="font-weight: 700;">⚠️ 警示：</span>${warningText}
                    </div>` : '';
                    
                let pitfallHtml = pitfallText ? 
                    `<div style="background-color: #eff6ff; color: #1e3a8a; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; border: 1px solid #dbeafe;">
                        <span style="font-weight: 700;">💡 避坑：</span>${pitfallText}
                    </div>` : '';

                sectionHtml += `
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 12px;">
                            <h4 style="font-size: 16px; font-weight: 700; margin: 0; color: #1d1d1f;">${itemNum}. ${itemName}</h4>
                            <span style="flex-shrink: 0; font-size: 11px; font-weight: 600; background: #f5f5f7; padding: 4px 10px; border-radius: 9999px; color: #86868b; text-transform: uppercase;">${itemUnit}</span>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            ${warningHtml}
                            ${pitfallHtml}
                        </div>
                    </div>
                `;

                if (!isUnlocked && stageName === '一、拆除新建' && (itemNum == '14' || itemName.includes('轻钢龙骨'))) {
                    stopRendering = true;
                    sectionHtml += `
                        </div>
                        <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(to top, rgba(255,255,255,1) 30%, rgba(255,255,255,0.8) 70%, transparent); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 24px; border-bottom-left-radius: 32px; border-bottom-right-radius: 32px;">
                            <button onclick="checkAgreementAndUnlock()" style="padding: 14px 28px; background: #000; color: #fff; font-weight: 700; border-radius: 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); margin-bottom: 14px; border: none;">
                                <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                                解锁全部避坑指南
                            </button>
                            <div style="display: flex; align-items: center; gap: 6px; font-size: 13px; color: #596065;">
                                <input type="checkbox" id="agreement-checkbox" style="width: 16px; height: 16px; accent-color: #000; margin: 0; cursor: pointer;">
                                <label for="agreement-checkbox" style="cursor: pointer;">已阅读并同意<a href="user_agreement.html" style="color: purple; text-decoration: none;">《用户协议》</a>和<a href="privacy_policy.html" style="color: purple; text-decoration: none;">《隐私协议》</a></label>
                            </div>
                        </div>
                    </section>`;
                    container.innerHTML += sectionHtml;
                    return; 
                }
            }

            if (!stopRendering) {
                sectionHtml += `</div></section>`;
                container.innerHTML += sectionHtml;
            }
        });
    }

    function checkAgreementAndUnlock() {
        const checkbox = document.getElementById('agreement-checkbox');
        if (!checkbox.checked) {
            document.getElementById('agreement-modal').classList.remove('hidden');
        } else {
            openUnlockModal();
        }
    }

    function closeAgreementModal() {
        document.getElementById('agreement-modal').classList.add('hidden');
    }

    function agreeAndContinue() {
        const checkbox = document.getElementById('agreement-checkbox');
        if (checkbox) checkbox.checked = true;
        closeAgreementModal();
        openUnlockModal();
    }

    function getCalculatedPrice(tierType) {
        if (!quoteData) return 0;
        const area = quoteData.area;
        const basePrice = TIER_PRICES[tierType];
        
        let pureCityName = quoteData.city.replace('市', '');
        let cityCoef = 0.7; 
        if (TIER1_CITIES.includes(pureCityName)) {
            cityCoef = 1.0;
        } else if (TIER2_CITIES.includes(pureCityName)) {
            cityCoef = 0.85;
        }

        const layoutCoef = LAYOUT_COEFFICIENT[quoteData.layout] || 1.0;
        const totalPrice = area * (basePrice * cityCoef * layoutCoef);
        
        return Math.floor(totalPrice / 100) * 100; 
    }

    function formatMoney(number) {
        return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function calculateAndDisplay(tierType) {
        const finalPrice = getCalculatedPrice(tierType);
        
        document.getElementById('price-value').innerText = formatMoney(finalPrice);
        document.getElementById('selected-tier').innerText = tierType;
        
        const currentYear = new Date().getFullYear();
        const descText = `${currentYear}年${quoteData.city}${quoteData.area}㎡${quoteData.condition}${tierType}型，基于《住宅室内装饰装修工程质量验收规范》测算，实际结算以现场复核工程量为准。`;
        document.getElementById('description-text').innerText = descText;
    }

    function switchTabLocal(el, tierType) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => {
            btn.classList.remove('tab-active');
            btn.classList.add('text-on-surface-variant');
        });
        el.classList.add('tab-active');
        el.classList.remove('text-on-surface-variant');

        if (localTimeout) clearTimeout(localTimeout);
        if (localDotInterval) clearInterval(localDotInterval);

        const currencySymbol = document.getElementById('currency-symbol');
        const priceValue = document.getElementById('price-value');
        const localLoadingState = document.getElementById('local-loading-state');
        const localLoadingText = document.getElementById('local-loading-text');

        currencySymbol.classList.add('hidden');
        priceValue.classList.add('hidden');
        localLoadingState.classList.remove('hidden');
        localLoadingState.classList.add('inline-flex');

        document.getElementById('description-text').innerHTML = '正在加载您的专属配置方案... <span id="selected-tier" style="display:none;"></span>';

        let dotCount = 0;
        localLoadingText.innerText = '正在计算';
        localDotInterval = setInterval(() => {
            dotCount = (dotCount + 1) % 4; 
            let dots = '';
            for(let i=0; i<dotCount; i++) dots += ' .';
            localLoadingText.innerText = '正在计算' + dots;
        }, 500);

        localTimeout = setTimeout(() => {
            clearInterval(localDotInterval);
            localLoadingState.classList.add('hidden');
            localLoadingState.classList.remove('inline-flex');
            currencySymbol.classList.remove('hidden');
            priceValue.classList.remove('hidden');
            
            calculateAndDisplay(tierType);
        }, 8000); 
    }

    let smsCountdown = 0;
    let smsInterval = null;

    function openUnlockModal() {
        document.getElementById('unlock-modal').classList.remove('hidden');
    }

    function closeUnlockModal() {
        document.getElementById('unlock-modal').classList.add('hidden');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast-message');
        if (toast) {
            toast.innerText = msg;
            toast.style.display = 'block';
            void toast.offsetWidth; 
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => { toast.style.display = 'none'; }, 300);
            }, 2000);
        }
    }

    function sendVerifyCode() {
        const phone = document.getElementById('phone-input').value.trim();
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            showToast('请输入正确的11位手机号码');
            return;
        }
        if (smsCountdown > 0) return;

        smsCountdown = 60;
        const btn = document.getElementById('send-code-btn');
        btn.classList.replace('bg-black', 'bg-gray-300');
        btn.innerText = `${smsCountdown}s后重发`;
        
        setTimeout(() => {
            const codeInput = document.getElementById('code-input');
            if (codeInput && !codeInput.value) {
                codeInput.value = Math.floor(1000 + Math.random() * 9000); 
            }
        }, 3000);
        
        smsInterval = setInterval(() => {
            smsCountdown--;
            if (smsCountdown <= 0) {
                clearInterval(smsInterval);
                btn.classList.replace('bg-gray-300', 'bg-black');
                btn.innerText = '获取验证码';
            } else {
                btn.innerText = `${smsCountdown}s后重发`;
            }
        }, 1000);
    }

    async function confirmUnlock() {
        const phone = document.getElementById('phone-input').value.trim();
        const code = document.getElementById('code-input').value.trim();
        
        if (!/^1[3-9]\d{9}$/.test(phone) || !code) {
            showToast('请完善手机号和验证码');
            return;
        }

        const uid = sessionStorage.getItem('referrer_uid') || '1';

        try {
            const response = await fetch('/api/quotation/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    phone: phone,
                    user_id: uid
                })
            });
            
            const resData = await response.json();
            
            if(resData.code !== 200) {
                showToast("提交失败: " + resData.message);
                return;
            }

            showToast("成功解锁");
            
            setTimeout(() => {
                closeUnlockModal();
                isUnlocked = true;
                localStorage.setItem('guide_unlocked', 'true'); 
                
                renderGuideData(globalCsvData);
            }, 800);

        } catch (error) {
            console.error("解锁请求失败:", error);
            showToast("网络异常，请重试");
        }
    }
</script>
</body>
</html>
