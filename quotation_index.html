<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#fcf7ff",
                        "secondary-fixed": "#d8e2ff",
                        "surface-container-highest": "#dde3e9",
                        "surface-variant": "#dde3e9",
                        "secondary": "#000000",
                        "primary-fixed": "#e2e2e2",
                        "inverse-surface": "#0c0e10",
                        "surface-container": "#ebeef2",
                        "surface-tint": "#5e5e5e",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed-dim": "#cac6e6",
                        "primary-container": "#e2e2e2",
                        "on-surface-variant": "#596065",
                        "on-primary-fixed-variant": "#5b5b5b",
                        "tertiary": "#5f5c78",
                        "tertiary-dim": "#53506b",
                        "secondary-fixed-dim": "#c2d4ff",
                        "on-secondary": "#ffffff",
                        "secondary-dim": "#000000",
                        "outline": "#757c81",
                        "on-tertiary-fixed-variant": "#54516d",
                        "inverse-primary": "#ffffff",
                        "surface-dim": "#d3dbe2",
                        "error": "#9f403d",
                        "surface": "#f9f9fb",
                        "surface-bright": "#f9f9fb",
                        "on-background": "#2d3338",
                        "primary-dim": "#525252",
                        "on-secondary-fixed": "#003d85",
                        "on-primary-fixed": "#3f3f3f",
                        "tertiary-fixed": "#d8d3f4",
                        "on-error": "#fff7f6",
                        "on-tertiary-container": "#4a4863",
                        "tertiary-container": "#d8d3f4",
                        "inverse-on-surface": "#9c9d9f",
                        "primary": "#5e5e5e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e4e9ee",
                        "on-secondary-container": "#004ea8",
                        "on-error-container": "#752121",
                        "error-dim": "#4e0309",
                        "background": "#f9f9fb",
                        "on-surface": "#2d3338",
                        "on-tertiary-fixed": "#37354f",
                        "on-primary": "#f8f8f8",
                        "on-primary-container": "#525252",
                        "error-container": "#fe8983",
                        "outline-variant": "#acb3b8",
                        "on-secondary-fixed-variant": "#0058bb",
                        "primary-fixed-dim": "#d4d4d4",
                        "secondary-container": "#d8e2ff"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-effect { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
        .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23596065' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen">
<!-- Top Navigation Shell -->
<nav class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-sm">
<h1 class="text-lg font-semibold tracking-tighter text-slate-900 dark:text-slate-100 mx-auto">装修报价计算器</h1>
</nav>
<main class="pt-16 pb-12">
<!-- Hero Section -->
<section class="relative h-[200px] w-full overflow-hidden mb-10">
<img alt="Modern Minimalist Interior" class="w-full h-full object-cover object-bottom" data-alt="Ultra-modern minimalist living room with floor-to-ceiling windows, soft natural sunlight, neutral tones, and designer furniture in a serene atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXCfctXXUp5FKboX87NC4UkaUztk6_NP_xpmycLWVSv2ERY_4j7FerZF8aXLz2nbb6BWLW_UzdgrHBVBKQqO-r89mNyU4xV8pO-IG-dmmXLh78GlOZ2id_gcEGT80LwFvJr67oohAPPcoB4877qNvdOo4GNsH1oKBWHqDVh_zTkypakmV3OmfFeLapKZVuqWw8CoJT3PXH1D3-AKjIO24b2PdAhzxjk4Mg0F7OJwPzUVT3-UYXyws4HNu0f7_6iA_14QOIW_8A1qLm"/>
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface/90"></div>
<div class="absolute bottom-6 left-6 right-6">
<span class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase text-black mb-1 block">Premium Estimation</span>
<h2 class="text-[2rem] font-bold tracking-tight leading-tight text-on-surface">开启您的理想空间之旅</h2>
</div>
</section>
<div class="px-6 space-y-12">
<!-- Location & Scale -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">地点与规模</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 01</span>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">所在城市</label>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-sm" placeholder="所在城市" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">建筑面积 (㎡)</label>
<input class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all placeholder:text-outline-variant text-sm" placeholder="输入面积" type="number"/>
</div>
</div>
</section>
<!-- Initial Condition -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">原始状态</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 02</span>
</div>
<div class="flex gap-2.5 overflow-x-auto pb-1 scrollbar-hide">
<button class="flex-none px-6 py-2.5 rounded-full bg-black text-white text-sm font-medium transition-transform active:scale-95 shadow-sm">毛坯房</button>
<button class="flex-none px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant text-sm font-medium hover:bg-surface-container-highest transition-colors">旧房翻新</button>
</div>
<div class="p-5 bg-surface-container-lowest rounded-xl shadow-[0_20px_40px_-10px_rgba(45,51,56,0.04)] border border-outline-variant/10">
<p class="text-xs text-on-surface-variant leading-relaxed">
                        毛坯房装修包含：墙面基层处理、水电改造、地面找平、厨卫防水等基础工程。
                    </p>
</div>
</section>
<!-- Layout Selection (Buttons) -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">户型布局</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 03</span>
</div>
<div class="space-y-3">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">选择房型</label>
<div class="grid grid-cols-2 gap-3">
<button class="h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">1室1厅</button>
<button class="h-12 bg-black text-white text-sm font-medium transition-all shadow-lg shadow-black/10 rounded-lg">2室1厅</button>
<button class="h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">3室1厅</button>
<button class="h-12 border border-surface-container-highest bg-surface-container-low text-sm font-medium hover:border-black transition-all rounded-lg">其他</button>
</div>
</div>
</section>
<!-- Material Selection -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold tracking-tight text-on-surface">材质选择</h3>
<span class="text-[0.625rem] uppercase tracking-wider text-on-surface-variant font-medium">Step 04</span>
</div>
<div class="space-y-4">
<!-- 客厅地面 -->
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">客厅地面</label>
<select class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all text-sm font-medium">
<option selected="">瓷砖</option>
<option>木地板</option>
</select>
</div>
<!-- 卧室地面 -->
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">卧室地面</label>
<select class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all text-sm font-medium">
<option>瓷砖</option>
<option selected="">木地板</option>
</select>
</div>
<!-- 墙面 -->
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-medium text-on-surface-variant ml-1">墙面</label>
<select class="w-full h-12 px-4 bg-surface-container-low border-none rounded-xl focus:ring-1 focus:ring-black focus:bg-surface-container-lowest transition-all text-sm font-medium">
<option selected="">乳胶漆</option>
<option>墙纸/墙布</option>
</select>
</div>
</div>
</section>
<!-- Bottom Action Area (Now in document flow) -->
<section class="pt-8 pb-12">
<div class="space-y-4">
<div class="space-y-1">
<div class="text-[11px] leading-[1.3] text-slate-500 text-left">测算结果将包含主材、辅材、人工明细。</div>
<div class="text-[11px] leading-[1.3] text-slate-500 text-left">今日已有 <span class="font-bold text-black italic">128</span> 位业主获取专属防坑报价单。</div>
</div>
<button class="w-full h-14 bg-black text-white font-bold shadow-2xl shadow-black/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 tracking-wide rounded-lg">
<span>开始计算报价</span>
<span class="material-symbols-outlined text-xl" data-icon="calculate">calculate</span>
</button>
</div>
</section>
</div>
</main>
</body></html>
